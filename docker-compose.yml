services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: cm
      POSTGRES_DB: cm_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cm -d cm_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
